{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <h2 class="mb-4">
        Login
    </h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-dark w-100">
            Login
        </button>

    </form>

    <p class="text-center mt-3">
        Don't have an account?
        <a href="{% url 'accounts:register' %}">
            Register
        </a>
    </p>

</div>

{% endblock %}
